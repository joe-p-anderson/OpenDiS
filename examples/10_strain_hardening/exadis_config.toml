[simulation-state]
    crystal = 'fcc'
    burgmag = 2.55e-10
    mu      = 54.6e9
    nu      = 0.324
    a       = 6.0
    maxseg  = 2000.0
    minseg  = 300.0
    rann    = 10.0
    rtol    = 10.0
    nextdt  = 1e-10
    maxdt   = 1e-9

[force-calculation]
    force_mode  = 'SUBCYCLING_MODEL'
    Ngrid = 64

[mobility-law]
    mobility_law = 'FCC_0'
    Medge   = 64103.0
    Mscrew  = 64103.0
    vmax    = 4000.0

[time-integration]
    integrator  = 'Subcycling'
    rgroups = [0.0, 100.0, 600.0, 1600.0]

[collision]
    collision_mode = 'Retroactive'

[topology]
    topology_mode = 'TopologyParallel'

[remesh]
    remesh_rule='LengthBased'

[sim]
    loading_mode = 'strain_rate'
    erate = 1e3
    edir = [0.0, 0.0, 1.0]
    max_strain = 1e-2
    burgmag = 2.55e-10
    print_freq = 1
    plot_freq = 10
    plot_pause_seconds = 1e-4
    write_freq = 100
    write_dir = 'output_fcc_Cu_15um_1e3_config'
    numpy = ['edir']

